        sha256: SET_AFTER_PREPARATION
      - path: data/benchmark/uadetrac_mvi_20011.mp4
        sha256: SET_AFTER_PREPARATION
      - path: data/benchmark/uadetrac_mvi_40152.mp4
        sha256: SET_AFTER_PREPARATION
      - path: data/benchmark/uadetrac_mvi_40714.mp4
