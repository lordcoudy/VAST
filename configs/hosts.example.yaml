hosts:
  # DeepStream, Savant, OpenVINO+GVA, and GStreamer custom have built-in strict
  # native canonical_distributed role commands. Set
  # DISTRIBUTED_NATIVE_CMD_<SYSTEM>_<ROLE> or DISTRIBUTED_NATIVE_CMD only when
  # replacing those defaults with site-specific native RTP-aware commands.
  # The common RTP bridge is intentionally available only in --mode smoke.
  - name: edge-node
    address: edge01.example.net
    user: vast
    port: 22
    project_path: /opt/vast
    roles: [edge]
    runtime:
      docker: true
      gpu: false
    env:
      VIDEO_LAYOUT_DIR: /opt/vast/data/videos
    transport:
      advertise_address: edge01.example.net

  - name: gpu-worker
    address: gpu01.example.net
    user: vast
    port: 22
    project_path: /opt/vast
    roles: [gpu_worker]
    runtime:
      docker: true
      gpu: true
    env:
      NVIDIA_VISIBLE_DEVICES: all
    transport:
      advertise_address: gpu01.example.net

  - name: aggregator
    address: agg01.example.net
    user: vast
    port: 22
    project_path: /opt/vast
    roles: [aggregator]
    runtime:
      docker: true
      gpu: false
    env: {}
    transport:
      advertise_address: agg01.example.net
