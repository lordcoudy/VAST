schema_version: 2
project:
  name: video-pipeline-scheduler-experiments
  description: Reproducible checkpoint benchmark suite for real KPP AVI video analytics.
benchmark:
  dataset_manifest: configs/datasets.yaml
  default_dataset:
    smoke: smoke_testsrc
    benchmark: kpp_real_h264
  telemetry_schema_version: 2
  publishable_telemetry_sources:
  - native
  scheduler_policies:
  - cpu_only
  - gpu_only
  - static_hybrid
  - heft
  - deadline_aware_heft
  - queue_aware_edf
  - adaptive_weights
  default_seed: 20260323
  active_scenarios:
  - checkpoint_independent_processes_baseline
  - checkpoint_video_dag_shared
  smoke_scenarios:
  - checkpoint_video_dag_shared
  report_scenarios:
  - checkpoint_independent_processes_baseline
  - checkpoint_video_dag_shared
  deadline_ms:
  - 16.7
  - 33.3
  - 50
  - 100
  - 500
  smoke_deadline_ms:
  - 100
  report_deadline_ms:
  - 16.7
  - 33.3
  - 50
  - 100
  - 500
  benchmark_datasets:
  - kpp_real_h264
  - kpp_real_h265
  report_datasets:
  - kpp_real_h264
  - kpp_real_h265
  scheduler_ablations:
  - no_queues
  - no_transfer_cost
  - no_deadline_penalty
  - no_adaptive_weights
transport:
  kind: gstreamer_rtp_udp
  trace_metadata: rtp_header_extension
  clock_sync: chrony
  max_clock_offset_ms: 5
  startup_grace_s: 5
  role_ports:
    edge_to_gpu_worker: 5600
    gpu_worker_to_aggregator: 5700
  stream_port_stride: 1
hardware_target:
  gpu_model: NVIDIA GeForce RTX 3060
  cpu_model: Intel Core i7-14700K
  ram_gb: 22
  deadline_s: 0.1
protocol:
  warmup_s: 30
  measurement_s: 180
  repeats: 10
  metric_interval_s: 1
  custom_cpp_cuda_qt_metric_interval_s: 0.2
scenarios:
  checkpoint_independent_processes_baseline:
    description: KPP baseline with independent detector processes; every analytics
      branch decodes and preprocesses its input again.
    benchmark_status: supported
    workload:
      seed_group: kpp_real_codecs_v1
      streams: 6
      logical_consumers: 4
      camera_layout:
      - stream_id: 0
        camera_role: plate_number
        source: data/videos/kpp/2.avi
      - stream_id: 1
        camera_role: plate_number
        source: data/videos/kpp/2.avi
      - stream_id: 2
        camera_role: vehicle_type
        source: data/videos/kpp/2.avi
      - stream_id: 3
        camera_role: damage
        source: data/videos/kpp/2.avi
      - stream_id: 4
        camera_role: damage
        source: data/videos/kpp/2.avi
      - stream_id: 5
        camera_role: foreign_object
        source: data/videos/kpp/1.avi
      object_density:
        min: 1
        max: 12
    pipeline:
    - decode_plate_number
    - preprocess_plate_number
    - plate_number
    - decode_vehicle_type
    - preprocess_vehicle_type
    - vehicle_type
    - decode_damage
    - preprocess_damage
    - damage
    - decode_foreign_object
    - preprocess_foreign_object
    - foreign_object
    - aggregate
    - record
    placement:
      policy: checkpoint_independent_local_cpu_gpu
      stages:
        decode_plate_number: local
        preprocess_plate_number: local
        plate_number: local
        decode_vehicle_type: local
        preprocess_vehicle_type: local
        vehicle_type: local
        decode_damage: local
        preprocess_damage: local
        damage: local
        decode_foreign_object: local
        preprocess_foreign_object: local
        foreign_object: local
        aggregate: local
        record: local
    network:
      profile: local
      latency_ms: 0
      bandwidth_mbps: 0
      packet_loss_percent: 0
    distributed:
      enabled: false
  checkpoint_video_dag_shared:
    description: KPP shared Video-DAG with one decode/preprocess prefix feeding plate,
      vehicle type, damage, and foreign object branches.
    benchmark_status: supported
    workload:
      seed_group: kpp_real_codecs_v1
      streams: 6
      logical_consumers: 4
      camera_layout:
      - stream_id: 0
        camera_role: plate_number
        source: data/videos/kpp/2.avi
      - stream_id: 1
        camera_role: plate_number
        source: data/videos/kpp/2.avi
      - stream_id: 2
        camera_role: vehicle_type
        source: data/videos/kpp/2.avi
      - stream_id: 3
        camera_role: damage
        source: data/videos/kpp/2.avi
      - stream_id: 4
        camera_role: damage
        source: data/videos/kpp/2.avi
      - stream_id: 5
        camera_role: foreign_object
        source: data/videos/kpp/1.avi
      object_density:
        min: 1
        max: 12
    pipeline:
    - decode
    - preprocess
    - plate_number
    - vehicle_type
    - damage
    - foreign_object
    - aggregate
    - record
    placement:
      policy: checkpoint_video_dag_local_cpu_gpu
      stages:
        decode: local
        preprocess: local
        plate_number: local
        vehicle_type: local
        damage: local
        foreign_object: local
        aggregate: local
        record: local
    network:
      profile: local
      latency_ms: 0
      bandwidth_mbps: 0
      packet_loss_percent: 0
    distributed:
      enabled: false
systems:
  deepstream:
    label: NVIDIA DeepStream SDK
    detector: native_deepstream
    backend: tensorrt
    container_image: nvcr.io/nvidia/deepstream:7.0-triton-multiarch
    supports_distributed: true
    command: bash scripts/run_system_template.sh --system deepstream --scenario {scenario}
      --duration {duration_s} --streams {streams} --min-objects {min_objects} --max-objects
      {max_objects} --output {output_dir}/frames.csv --deadline-ms {deadline_ms}
  savant:
    label: Savant
    detector: peoplenet
    backend: deepstream_tensorrt
    container_image: ghcr.io/insight-platform/savant-deepstream:0.5.17-7.0
    supports_distributed: true
    command: bash scripts/run_system_template.sh --system savant --scenario {scenario}
      --duration {duration_s} --streams {streams} --min-objects {min_objects} --max-objects
      {max_objects} --output {output_dir}/frames.csv --deadline-ms {deadline_ms}
  openvino_gva:
    label: Intel OpenVINO + GVA
    detector: person-vehicle-bike-detection-crossroad-0078
    backend: openvino_cpu
    container_image: intel/dlstreamer:latest
    supports_distributed: true
    command: bash scripts/run_system_template.sh --system openvino_gva --scenario
      {scenario} --duration {duration_s} --streams {streams} --min-objects {min_objects}
      --max-objects {max_objects} --output {output_dir}/frames.csv --deadline-ms {deadline_ms}
  gstreamer_custom:
    label: GStreamer + custom plugin
    detector: custom_gstreamer_native
    backend: gstreamer
    supports_distributed: true
    command: bash scripts/run_system_template.sh --system gstreamer_custom --scenario
      {scenario} --duration {duration_s} --streams {streams} --min-objects {min_objects}
      --max-objects {max_objects} --output {output_dir}/frames.csv --deadline-ms {deadline_ms}
  custom_cpp_cuda_qt:
    label: Custom C++ + CUDA + Qt
    detector: custom_cuda_signal
    backend: cuda_qt
    supports_distributed: true
    command: bash scripts/run_system_template.sh --system custom_cpp_cuda_qt --scenario
      {scenario} --duration {duration_s} --streams {streams} --min-objects {min_objects}
      --max-objects {max_objects} --output {output_dir}/frames.csv --deadline-ms {deadline_ms}
